name: Render Scene 1 MP4

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render first scene
        run: ./scripts/render-scene1.sh

      - name: Upload scene1 mp4
        uses: actions/upload-artifact@v4
        with:
          name: scene1-mp4
          path: output/scene1.mp4
